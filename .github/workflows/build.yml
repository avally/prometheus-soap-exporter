name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate Dockerfile, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: prometheus-soap-exporter:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max