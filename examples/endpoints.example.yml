# Example configuration for prometheus-soap-exporter.
# Copy to endpoints.yml and adapt to your environment.

defaults:
  interval: 60        # seconds between probes
  timeout: 10         # request timeout in seconds

endpoints:

  # Example 1: SOAP without authentication
  - name: "Example SOAP Service"
    url: "https://www.dataaccess.com/webservicesserver/NumberConversion.wso"
    # wsdl: "https://www.dataaccess.com/webservicesserver/NumberConversion.wso?WSDL"  # optional
    soap_action: "http://www.dataaccess.com/webservicesserver/NumberToWords"
    headers:
      Content-Type: "text/xml; charset=utf-8"
    body: |
      <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                        xmlns:web="http://www.dataaccess.com/webservicesserver/">
        <soapenv:Header/>
        <soapenv:Body>
          <web:NumberToWords>
            <web:ubiNum>42</web:ubiNum>
          </web:NumberToWords>
        </soapenv:Body>
      </soapenv:Envelope>
    auth:
      type: none
    expected:
      status_code: 200
      body_regex: "forty two"           # regular expression matched against the response body
      # body_xpath: "//return[1]"       # XPath expression (optional, alternative to regex)
    interval: 120

